<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncSphere CRM</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-row">
        <!-- Logo Option -->
        <div class="brand" style="display:flex; align-items:center; gap:8px;">
          <img src="logo.svg" alt="SyncSphere Logo" style="height:24px; width:24px;" onerror="this.style.display='none'">
          SyncSphere
        </div>
        <div class="search-wrap">
          <input type="text" id="globalSearch" class="search-input" placeholder="Search contacts...">
          <button id="aiSearchBtn" class="btn btn-secondary btn-small ai-toggle">✨ Ask AI</button>
        </div>
        <div class="topbar-actions">
          <button id="authDriveBtn" class="btn btn-secondary btn-small">Drive Login</button>
          <button id="syncDriveBtn" class="btn btn-primary btn-small" hidden>Sync Data</button>
          <button id="settingsBtn" class="btn btn-ghost btn-icon">⚙️</button>
        </div>
      </div>
      <div class="tabbar">
        <button class="tab active" data-view="directory">Directory</button>
        <button class="tab" data-view="network">Network Map</button>
      </div>
    </header>

    <main class="main">
      <!-- Directory View -->
      <div id="view-directory" class="view active">
        <div class="filter-bar">
          <button id="addContactBtn" class="btn btn-primary">+ Add Contact</button>
          <button id="importVcfBtn" class="btn btn-secondary">Import vCard</button>
          <input type="file" id="vcfInput" accept=".vcf" hidden>
          <div class="filter-spacer"></div>
          <span id="resultCount" class="result-count">0 contacts</span>
        </div>
        <div id="contactGrid" class="contact-grid"></div>
        <div id="emptyState" class="empty-state">
          <h3>No contacts found</h3>
          <p class="empty-sub">Add a contact or import a vCard to get started.</p>
        </div>
      </div>

      <!-- Network View -->
      <div id="view-network" class="view" style="height: 70vh; position: relative;">
        <div style="position:absolute; top:10px; right:10px; z-index:10; display:flex; gap:5px;">
          <button id="zoomInBtn" class="btn btn-secondary btn-small">+</button>
          <button id="zoomOutBtn" class="btn btn-secondary btn-small">-</button>
          <button id="resetZoomBtn" class="btn btn-secondary btn-small">Reset</button>
        </div>
        <canvas id="networkCanvas" style="width:100%; height:100%; border:1px solid var(--border); border-radius:var(--radius);"></canvas>
      </div>
    </main>
  </div>

  <!-- Contact Modal -->
  <div id="contactModal" class="modal-backdrop" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="contactModalTitle">New Contact</h2>
        <button class="modal-close" data-close="contactModal">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="contactId">
        <div class="form-row form-row-pfp">
          <div id="pfpPreview" class="pfp-preview">
            <img id="pfpImg" hidden>
            <span id="pfpInitial">?</span>
          </div>
          <div>
            <label class="btn btn-secondary btn-small">
              Upload Photo <input type="file" id="pfpInput" accept="image/*" hidden>
            </label>
            <button id="removePfpBtn" class="btn btn-ghost btn-small" hidden>Remove</button>
          </div>
        </div>
        <div class="form-row">
          <label>Full Name</label>
          <input type="text" id="fullNameInput" class="input" placeholder="e.g. Jane Doe">
        </div>
        <div class="form-row form-row-split">
          <div>
            <label>Tags (comma separated)</label>
            <input type="text" id="tagsInput" class="input" placeholder="e.g. Work, VIP">
          </div>
          <div>
            <label>Reconnect Goal</label>
            <div style="display:flex; gap:8px;">
              <input type="number" id="frequencyInput" class="input" placeholder="Value" style="flex:1;">
              <select id="frequencyUnit" class="select" style="margin-top:4px; flex:1;">
                <option value="1">Days</option>
                <option value="7">Weeks</option>
                <option value="30">Months</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-row">
          <label>Contact Methods</label>
          <div id="handleRows" class="dynamic-rows"></div>
          <button id="addHandleBtn" class="btn btn-ghost btn-small btn-block">+ Add Method</button>
        </div>
        <div class="form-row">
          <label>Relationships</label>
          <div id="relationRows" class="dynamic-rows"></div>
          <div class="relation-add">
            <select id="relationTargetSelect" class="select"></select>
            <input type="text" id="relationLabelInput" class="input" placeholder="e.g. Manager">
          </div>
          <button id="addRelationBtn" class="btn btn-ghost btn-small btn-block">+ Add Relation</button>
        </div>
        <div class="form-row">
          <label>Notes</label>
          <textarea id="notesInput" class="input textarea" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="row-between" style="margin-bottom:8px;">
            <label style="margin:0;">Interactions</label>
            <button id="addInteractionBtn" class="btn btn-secondary btn-small">+ Log</button>
          </div>
          <div id="interactionList" class="interaction-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="deleteContactBtn" class="btn btn-danger">Delete</button>
        <div class="modal-footer-spacer"></div>
        <button class="btn btn-secondary" data-close="contactModal">Cancel</button>
        <button id="saveContactBtn" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Quick Interaction Modal -->
  <div id="interactionModal" class="modal-backdrop" hidden>
    <div class="modal modal-small">
      <div class="modal-header">
        <h2>Log Interaction</h2>
        <button class="modal-close" data-close="interactionModal">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="quickInteractionContactId">
        <div class="form-row">
          <label>Channel</label>
          <input type="text" id="quickChannelInput" class="input" placeholder="e.g. Email, Coffee">
        </div>
        <div class="form-row">
          <label>Summary</label>
          <textarea id="quickSummaryInput" class="input textarea" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="interactionModal">Cancel</button>
        <button id="saveQuickInteractionBtn" class="btn btn-primary">Save Log</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal-backdrop" hidden>
    <div class="modal modal-small">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" data-close="settingsModal">&times;</button>
      </div>
      <div class="modal-body">
        <p id="aiStatus" style="color:var(--accent); font-weight:bold; margin-bottom: 10px;"></p>
        <div class="settings-block">
          <div class="settings-label">Security & Sync</div>
          <p class="label-hint" style="margin-bottom:8px;">Data is encrypted locally before being synced to Google Drive via AES-256-GCM.</p>
          <input type="password" id="masterPassword" class="input" placeholder="Master Password (Required for Sync)">
        </div>
        <div class="settings-block">
          <div class="settings-label">Danger Zone</div>
          <button id="wipeLocalBtn" class="btn btn-danger btn-block">Wipe Local Database</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <!-- Scripts -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="crypto.js"></script>
  <script src="gdrive.js"></script>
  <script src="vcard.js"></script>
  <script src="network.js"></script>
  <script src="ai.js" type="module"></script>
  <script src="app.js"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
